<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Model Selector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #1a1a18;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #ececec;
    padding: 40px;
  }

  /* ── Trigger pill ──────────────────────────────────────── */
  .trigger-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
  }

  .trigger-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1d1d1b;
    border: 1px solid #34342f;
    border-radius: 999px;
    padding: 6px 12px;
    cursor: pointer;
    user-select: none;
    transition: background .15s ease;
  }
  .trigger-pill:hover { background: #242421; }
  .trigger-pill .model-name { color: #f5f5f3; font-size: 14.5px; font-weight: 500; }
  .trigger-pill .effort     { color: #8a8a85; font-size: 14.5px; }
  .trigger-pill .chev       { color: #8a8a85; display: flex; }

  .deco-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    color: #8a8a85;
    background: transparent; border: none; cursor: pointer;
    border-radius: 50%;
  }
  .deco-btn:hover { background: #242421; }

  /* ── Dropdown panel ────────────────────────────────────── */
  .panel-wrap {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
  }

  .panel {
    width: 300px;
    background: #2b2a28;
    border: 1px solid #3a3a38;
    border-radius: 16px;
    padding: 6px;
    box-shadow: 0 20px 50px rgba(0,0,0,.55);
  }

  /* model rows */
  .row {
    display: flex;
    align-items: center;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background .12s ease;
  }
  .row:hover { background: #34332f; }

  .row .text { flex: 1; min-width: 0; }

  .name {
    color: #f2f2ef;
    font-size: 15px;
    font-weight: 450;
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .desc {
    color: #8a8a85;
    font-size: 13px;
    line-height: 1.3;
    margin-top: 1px;
  }

  .check { color: #4a9eff; display: none; flex-shrink: 0; margin-left: 10px; }
  .row.selected .check { display: flex; }

  /* disabled / unavailable */
  .row.disabled { cursor: default; }
  .row.disabled:hover { background: transparent; }
  .row.disabled .name,
  .row.disabled .desc { color: #67675f; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #33332f;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 12px;
    color: #8a8a85;
    font-weight: 400;
    white-space: nowrap;
  }
  .badge svg { display: block; }

  /* right-side meta (Effort / chevrons) */
  .meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #8a8a85;
    font-size: 14px;
  }
  .meta .chev-right { display: flex; }

  /* option rows (Effort / More models) — single line */
  .row.option { padding: 11px 14px; }
  .row.option .name { font-size: 15px; }

  /* divider */
  .divider {
    height: 1px;
    background: #3a3a38;
    margin: 4px 0;
  }
</style>
</head>
<body>

  <!-- Trigger / closed state -->
  <div class="trigger-row">
    <div class="trigger-pill" id="trigger">
      <span class="model-name" id="trigger-name">Nasty 19</span>
      <span class="effort">High</span>
      <span class="chev">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </span>
    </div>
    <button class="deco-btn" aria-label="Microphone">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>
      </svg>
    </button>
    <button class="deco-btn" aria-label="Audio">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M3 12h2M7 7v10M11 4v16M15 8v8M19 11h2"/>
      </svg>
    </button>
  </div>

  <!-- Dropdown panel -->
  <div class="panel-wrap">
    <div class="panel" id="panel">

      <!-- Disabled / unavailable -->
      <div class="row disabled">
        <div class="text">
          <div class="name">
            Myth atp 20
            <span class="badge">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r=".4" fill="currentColor" stroke="none"/>
              </svg>
              Currently unavailable until Sept 30t
            </span>
          </div>
          <div class="desc">For your toughest challenges</div>
        </div>
      </div>

      <!-- Selected -->
      <button class="row model selected" data-name="Nasty 19">
        <div class="text">
          <div class="name">Nasty 19</div>
          <div class="desc">For complex tasks</div>
        </div>
        <span class="check">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>
        </span>
      </button>

      <!-- M4 18 -->
      <button class="row model" data-name="M4 18">
        <div class="text">
          <div class="name">M4 18</div>
          <div class="desc">Most efficient for everyday tasks</div>
        </div>
        <span class="check">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>
        </span>
      </button>

      <!-- Mark l 17 -->
      <button class="row model" data-name="Mark l 17">
        <div class="text">
          <div class="name">Mark l 17</div>
          <div class="desc">Training Wheels Protocol</div>
        </div>
        <span class="check">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>
        </span>
      </button>

      <div class="divider"></div>

      <!-- Effort -->
      <button class="row option">
        <div class="name">Effort</div>
        <span class="meta">
          High
          <span class="chev-right">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          </span>
        </span>
      </button>

      <div class="divider"></div>

      <!-- More models -->
      <button class="row option">
        <div class="name">More models</div>
        <span class="meta">
          <span class="chev-right">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          </span>
        </span>
      </button>

    </div>
  </div>

  <script>
    const models = document.querySelectorAll('.row.model');
    const triggerName = document.getElementById('trigger-name');
    models.forEach(row => {
      row.addEventListener('click', () => {
        models.forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');
        triggerName.textContent = row.dataset.name;
      });
    });
  </script>

</body>
</html>
